<!doctype html>
<html lang="es">
  <body style="margin:0;background:#faf7f2;color:#1c1917;font-family:Arial,sans-serif;">
    <main style="max-width:560px;margin:0 auto;padding:40px 24px;">
      <h1 style="font-family:Georgia,serif;font-size:28px;line-height:1.2;margin:0 0 20px;">
        Tu cielo te espera
      </h1>
      <p style="font-size:16px;line-height:1.6;margin:0 0 20px;">
        Entra con este enlace o escribe el codigo del correo en la web.
      </p>
      <p style="margin:28px 0;">
        <a
          href="{{ .ConfirmationURL }}"
          style="display:inline-block;background:#e8754b;color:#ffffff;text-decoration:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;"
        >
          Entrar al cielo de Madrid
        </a>
      </p>
      <p style="font-size:14px;line-height:1.6;color:#78716c;margin:0 0 10px;">
        Codigo de acceso
      </p>
      <p
        style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:30px;letter-spacing:8px;line-height:1.2;margin:0 0 28px;color:#1c1917;"
      >
        {{ .Token }}
      </p>
      <p style="font-size:14px;line-height:1.6;color:#78716c;margin:0 0 28px;">
        If English is easier: click the button, or enter the six-digit code above.
      </p>
      <p style="font-size:15px;line-height:1.6;margin:0;">
        Madrid Sunsets
      </p>
    </main>
  </body>
</html>
